services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: carbon_tracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    image: node:20
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/carbon_tracker
      - GROQ_API_KEY=${GROQ_API_KEY}
      - AUTH_SECRET=${AUTH_SECRET}
    depends_on:
      - db
    volumes:
      - .:/app
    command: sh -c "npm install && npx prisma db push && npx prisma generate && npm run dev"

volumes:
  pgdata:
